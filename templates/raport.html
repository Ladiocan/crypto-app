<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Raport Predicții</title>
    <style>
        table {
            border-collapse: collapse;
            width: 100%;
            margin: 20px 0;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #f4f4f4;
            font-weight: bold;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>
    <h1>Raport Predicții</h1>
    <div id="tabel">{{ tabel|safe }}</div>
    <h2>Analiza ultimele 24 ore</h2>
    <div id="analiza">
        {% if analiza %}
            {{ analiza|safe }}
        {% else %}
            <p>Nu există date pentru analiză.</p>
        {% endif %}
    </div>
    <a href="/">Înapoi la Predicții</a>
</body>
</html>
